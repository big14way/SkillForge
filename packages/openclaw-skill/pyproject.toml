[project]
name = "skillforge-claw"
version = "0.3.0"
description = "SkillForge meta-skill for OpenClaw agents — discover, rent, invoke, and rate tokenized AI skills on 0G."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Gwill", email = "idolorwilly@icloud.com" }]
keywords = ["openclaw", "agents", "0g", "skills", "marketplace"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "click>=8.1.7",
  "httpx>=0.27.0",
  "rich>=13.9.0",
  "pydantic>=2.9.0",
  "eth-utils>=5.0.0",
  "eth-hash[pycryptodome]>=0.7.0",
]

[project.scripts]
skillforge = "skillforge.cli:main"

[project.urls]
Homepage = "https://github.com/big14way/SkillForge"
Repository = "https://github.com/big14way/SkillForge"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/skillforge"]

[tool.uv]
dev-dependencies = [
  "pytest>=8.3.0",
  "pytest-httpx>=0.35.0",
  "mypy>=1.14.0",
  "ruff>=0.9.0",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.mypy]
strict = true
ignore_missing_imports = true

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[rpc_endpoints]
galileo = "${GALILEO_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
